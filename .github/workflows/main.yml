name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 빌드 작업 (리눅스용 전용 모듈 설치 포함)
      - name: Install and Build
        run: |
          cd Drawing_detecter/frontend
          npm install
          # 리눅스 환경 빌드 시 발생하는 Rollup 에러 방지를 위한 모듈 설치
          npm install @rollup/rollup-linux-x64-gnu
          npm run build

      # 2. 파이어베이스 배포 (firebase.json 위치 지정)
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_DRAWING_DETECTER }}'
          channelId: live
          projectId: rag-1af49
          entryPoint: Drawing_detecter
