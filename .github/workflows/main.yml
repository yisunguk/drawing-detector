name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 빌드 작업 (폴더 경로 이동 추가)
      - name: Install and Build
        run: |
          cd Drawing_detecter/frontend
          npm ci
          npm run build

      # 2. 파이어베이스 배포 (entryPoint 추가)
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_DRAWING_DETECTER }}'
          channelId: live
          projectId: rag-1af49
          entryPoint: Drawing_detecter  # firebase.json이 있는 폴더 지정
